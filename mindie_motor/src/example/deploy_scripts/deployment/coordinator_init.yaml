apiVersion: mindxdl.gitee.com/v1
kind: AscendJob
metadata:
  name: xxxx-coordinator        #以具体任务为准, xxxx默认mindie-ms
  namespace: mindie            #以MindIE为准，用户可修改
  labels:
    framework: pytorch
    app: mindie-ms-coordinator      #固定
    jobID: xxxx               # 推理任务的名称，用户需配置，追加，xxxx默认mindie-ms
    ring-controller.atlas: ascend-910b
spec:
  schedulerName: volcano   # work when enableGangScheduling is true
  runPolicy:
    schedulingPolicy:      # work when enableGangScheduling is true
      minAvailable: 1      # 保持和replicas一致
      queue: default
  successPolicy: AllWorkers
  replicaSpecs:
    Master:
      replicas: 1           # controller的副本数
      restartPolicy: Always
      template:
        metadata:
          labels:
            #ring-controller.atlas: ascend-910b
            app: mindie-ms-coordinator
            jobID: xxxx      #推理任务的名称，用户需配置，追加，xxxx默认mindie
        spec:                # 和之前保持一致
#          nodeSelector:
            #accelerator: huawei-Ascend910
            # machine-id: "7"
          terminationGracePeriodSeconds: 0
          automountServiceAccountToken: false
          securityContext:
            fsGroup: 1001
          containers:
            - image: mindie:dev-2.0.RC1-B087-800I-A2-py311-ubuntu22.04-aarch64
              imagePullPolicy: IfNotPresent
              name: ascend
              securityContext:
                # allowPrivilegeEscalation: false
                privileged: true
                capabilities:
                  drop: [ "ALL" ]
                seccompProfile:
                  type: "RuntimeDefault"
              readinessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - "$MIES_INSTALL_PATH/scripts/http_client_ctl/probe.sh readiness"
                periodSeconds: 5
              livenessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - "$MIES_INSTALL_PATH/scripts/http_client_ctl/probe.sh liveness"
                periodSeconds: 5
                timeoutSeconds: 4
              startupProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - "$MIES_INSTALL_PATH/scripts/http_client_ctl/probe.sh startup"
                periodSeconds: 5
                failureThreshold: 100
              env:
                - name: POD_IP
                  valueFrom:
                    fieldRef:
                      fieldPath: status.podIP
                - name: GLOBAL_RANK_TABLE_FILE_PATH
                  value: "/user/serverid/devindex/config/..data/global_ranktable.json"
                - name: TORCH_DEVICE_BACKEND_AUTOLOAD
                  value: "0"
                - name: MIES_INSTALL_PATH
                  value: /usr/local/lib/python3.11/site-packages/mindie_motor
                - name: CONFIG_FROM_CONFIGMAP_PATH
                  value: /mnt/configmap
                - name: COORDINATOR_LOG_CONFIG_PATH
                  value: /root/mindie
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              envFrom:
                - configMapRef:
                    name: common-env
              command: [ "/bin/bash", "-c", "
                      /mnt/configmap/boot.sh; \n
                  " ]
              resources:
                requests:
                  memory: "12Gi"
                  cpu: "16"
                limits:
                  memory: "16Gi"
                  cpu: "64"
              volumeMounts:
                - name: global-ranktable
                  mountPath: /user/serverid/devindex/config
                - name: mindie-http-client-ctl-config
                  mountPath: /mnt/configmap/http_client_ctl.json
                  subPath: http_client_ctl.json
                - name: python-script-get-group-id
                  mountPath: /mnt/configmap/get_group_id.py
                  subPath: get_group_id.py
                - name: python-file-utils
                  mountPath: /mnt/configmap/file_utils.py
                  subPath: file_utils.py
                - name: boot-bash-script
                  mountPath: /mnt/configmap/boot.sh
                  subPath: boot.sh
                - name: mindie-ms-controller-config
                  mountPath: /mnt/configmap/ms_controller.json
                  subPath: ms_controller.json
                - name: mindie-ms-coordinator-config
                  mountPath: /mnt/configmap/ms_coordinator.json
                  subPath: ms_coordinator.json
                - name: localtime
                  mountPath: /etc/localtime
                - name: mnt
                  mountPath: /mnt
          volumes:
            - name: localtime
              hostPath:
                path: /etc/localtime
            - name: global-ranktable
              configMap:
                name: global-ranktable
                defaultMode: 0640
            - name: mindie-http-client-ctl-config
              configMap:
                name: mindie-http-client-ctl-config
                defaultMode: 0640
            - name: python-script-get-group-id
              configMap:
                name: python-script-get-group-id
                defaultMode: 0640
            - name: python-file-utils
              configMap:
                name: python-file-utils
                defaultMode: 0550
            - name: boot-bash-script
              configMap:
                name: boot-bash-script
                defaultMode: 0550
            - name: mindie-ms-controller-config
              configMap:
                name: mindie-ms-controller-config
                defaultMode: 0640
            - name: mindie-ms-coordinator-config
              configMap:
                name: mindie-ms-coordinator-config
                defaultMode: 0640
            - name: mnt
              hostPath:
                path: /mnt
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: mindie-ms-coordinator
    jobID: xxxx                     # 推理任务的名称，用户需配置，追加，xxxx默认mindie-ms
  name: mindie-ms-coordinator-infer # 不能命名为mindie-ms-coordinator，k8s会在controller容器内导入MINDIE_MS_COORDINATOR_PORT=tcp://xxx.xxx:1025， 被controller读取，导致通信异常
  namespace: mindie
spec:
  ports:
    - name: infer-http
      nodePort: 31015
      port: 1025
      protocol: TCP
      targetPort: 1025
    # metrics端口映射
#    - name: metrics-http
#      nodePort: 31016
#      port: 1028
#      protocol: TCP
#      targetPort: 1028
  selector:
    app: mindie-ms-coordinator
  sessionAffinity: None
  type: NodePort
status:
  loadBalancer: {}
